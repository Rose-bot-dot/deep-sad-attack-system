<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>系统登录</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e8f1ff, #f5f7fa);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 32px 28px;
        }

        .title {
            text-align: center;
            margin-bottom: 8px;
            font-size: 26px;
            color: #222;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert-error {
            background-color: #fff2f0;
            color: #cf1322;
            border: 1px solid #ffccc7;
        }

        .alert-success {
            background-color: #f6ffed;
            color: #389e0d;
            border: 1px solid #b7eb8f;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 11px 12px;
            margin-bottom: 16px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #1677ff;
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #0f5fd6;
        }

        .footer-links {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .footer-links a {
            color: #1677ff;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .hint {
            margin-top: 14px;
            text-align: center;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="card">
            <div class="title">攻击检测系统</div>
            <div class="subtitle">基于 Deep SAD 的攻击检测系统登录入口</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert {% if messages[0][0] == 'error' %}alert-error{% else %}alert-success{% endif %}">
                            {{ messages[0][1] }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="post">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required>

                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>

                <button type="submit">登录</button>
            </form>

            <div class="footer-links">
                没有账号？<a href="/register">立即注册</a>
            </div>

            <div class="hint">
                管理员默认账号：admin / 123456
            </div>
        </div>
    </div>
</body>
</html>
